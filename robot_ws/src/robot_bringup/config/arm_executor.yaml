# ===================================================================
# 机械臂执行层参数配置（arm_executor_node）
#
# 适用 launch：arm_bringup.launch.py
# 也可以通过方案一/方案二的 YAML 文件一并传入。
# ===================================================================

arm_executor_node:
  ros__parameters:
    # ---- 启动时自动初始化 ----
    do_init: true                         # 是否在启动时走到初始工作位姿

    # 初始工作位姿（关节角，度）
    # 当前配置：[0, -45, 120, -90, 90, 90]
    # 这是一个舒展的工作姿态，适合开始抓取任务
    init_joint_pos_deg: [0.0, -45.0, 120.0, -90.0, 90.0, 90.0]
